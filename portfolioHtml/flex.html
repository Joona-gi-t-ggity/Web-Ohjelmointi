<!DOCTYPE html>

<html lang="fi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" href="../media/iconDrawing.png" type="image/png">
        <link rel="stylesheet" href="../CSS/flex.css" id="styleSheetElem">
        <title> Flex </title>
    </head>
    <body>
        <header>
            <h1 style="text-align: center;"> Flex </h1>
            <hr>
        </header>
        <div style="display: flex; margin-left: 0%;">
            <nav> <!-- Nav palkki -->
                <a href="../subHtml/cv_sivu.html"> CV sivulle... </a>
                <a href="../subHtml/tyokoke.html"> Tylkokemus sivulle... </a>
                <a href="../main.html"> Portfolioon..? </a>
            </nav>
            <button onclick='swapCSS("../CSS")' style="margin-left: auto;">Muuta CSS-</button>
            <button onclick='showCSS("CssButton")' id="CssButton">Näytä CSS-</button>
            <script src="../js/javascript.js"></script>
        </div>
        <hr>
        <main>
            <div style="padding: 0px;">
                flex-container
                <div id="flex_a">
                    <script>
                        const flex_a = document.getElementById("flex_a");
                        
                        const pokemonList = ["Bulbasaur", "Ivysaur", "Venusaur", "Charmander", "Charmeleon", "Charizard", "Squirtle", "Wartortle", "Blastoise", "Caterpie"]
                        const digimonList = ["Abbadomon", "Bakemon", "Cardmon C2", "Darcmon", "Elizamon", "Fumamon", "Gammamon", "Jyarimon", "Keramon", "Mockingbirdmon"]
                        const palList = ["Anubis", "Cattiva", "Cawgnito", "Chikipi", "Dazzi Noct", "Leezpunk", "Lifmunk", "Lumball", "Maraith", "Pyrun Noct"]

                        for (let i = 0; i < 3; i++) {
                            var subjectList = [];
                            var subjectDir_path = "";
                            if (i === 0) {
                                subjectList = pokemonList;
                                subjectDir_path = "../media/pokemonit/";
                                var flex_b = '<div> flex-container'
                            } else if (i === 1) {
                                subjectList = digimonList;
                                subjectDir_path = "../media/digimonit/";
                                var flex_b = '<div> Digimon'
                            } else if (i === 2) {
                                subjectList = palList;
                                subjectDir_path = "../media/pallit_XD/";
                                var flex_b = '<div> Palworld'
                            } else {
                                subjectList = [];
                                subjectDir_path = "../media/";
                                var flex_b = '<div> Hmm mites näin kävi'
                            }
                            for (let subI = 0; subI < 10; subI++) {
                                flex_b += `
                                    <div>
                                        <img src="${subjectDir_path}${subjectList[subI]}.png" alt="${subjectList[subI]}"
                                        style="width:56px; height:56px;">
                                        <h3> ${subjectList[subI]} </h3>
                                    </div>
                                    `;
                            }
                            flex_a.innerHTML += flex_b;
                        }
                    </script>
                </div>
            </div>
        </main>
    </body>
</html>
