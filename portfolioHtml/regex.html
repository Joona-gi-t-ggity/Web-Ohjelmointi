<!DOCTYPE html>
<html lang="fi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" href="../media/iconDrawing.png" type="image/png">
        <link rel="stylesheet" href="../CSS/styles.css">
        <title> Regex </title>
    </head>
    <body>
        <header>
            <h1 style="text-align: center;"> Regex sivu </h1>
            <hr>
        </header>
        <nav>
            <a href="../subHtml/cv_sivu.html"> CV sivulle... </a>
            <a href="../subHtml/tyokoke.html"> Tylkokemus sivulle... </a>
            <a href="../main.html"> Portfolioon..? </a>
        </nav>
        <hr>
        <form>
            <label for="plate">Rekisterikilpi:</label>
            <input type="text" id="plate" name="plate"
            pattern="[A-Ö]{3}-[0-9]{3}" placeholder="ABC-123">
            <br>
            <label for="socialsec">Henkilötunnus:</label>
            <input type="text" id="socialsec" name="socialsec"
            pattern="[0-9]{6}([\-]{1}|[A]{1})[0-9]{3}[A-Ö]{1}" placeholder="000199-001A">
            <br>
            <label for="date">Päivämäärä:</label>
            <input type="text" id="date" name="date"
            pattern="[0-9]{1,2}\.(([0-9]{1,2}\.[0-9]{4})|([a-öA-Ö]{1,} [0-9]{4}))" placeholder="5.6.2026">
            <br>
            <label for="phone">Puhelinnumero:</label>
            <input type="text" id="phone" name="phone"
            pattern="((\+[0-9]{1,3} )|(a-öA-Ö0-9){0})[0-9]{9,10}" placeholder="+358 401517735">
            <br>
            <label for="elem">Html elementti:</label>
            <input type="text" id="elem" name="elem"
            pattern="&lt;[^\/].+&gt;.+&lt;\/.+&gt;" placeholder="&lt;h1&gt; moi XD &lt;/h1&gt;">
            <br>
            <br> 
            <button type="submit">Lähetä</button>
        </form>
    </body>
</html>
