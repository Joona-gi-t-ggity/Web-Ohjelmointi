<!DOCTYPE html>

<html lang="fi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title> Quiz </title>
    </head>
    <body>
        <form action="iqQuiz">
            <label for="yuoi"> Kumpi on parempi yuri vai yaoi? </label>
            <select name="yuoi" id="yuoi">
                <option value="1"> yuri </option>
                <option value="-1"> yaoi </option>
            </select>

            <label for="kisrat"> Kumpi on parempi kissat vai koirat? </label>
            <select name="kisrat" id="kisrat">
                <option value="1"> kissat </option>
                <option value="-1"> koirat </option>
            </select>

            <label for="rasismi"> Onko rasismi okei? </label>
            <select name="rasismi" id="rasismi">
                <option value="-1"> kyllä </option>
                <option value="1"> ei </option>
                <option value="0.5"> jos se on hauska lol </option>
            </select>

            <label for="uulaKewl"> Onko Uula tosi kewl? </label>
            <select name="uulaKewl" id="uulaKewl">
                <option value="1"> kyllä </option>
                <option value="-2"> ei </option>
            </select>

            <label for="paiva"> Mikä päivä tänään on? </label>
            <input type="date" name="paiva">

            <label for="lompakko"> Onko juutalaisten syyttäminen oikein jos kadottaa lompakon? </label>
            <select name="lompakko" id="lompakko">
                <option value="-1"> kyllä </option>
                <option value="1"> ei </option>
                <option value="0.5"> ei, paitsi jossei sitä löydy hetkeen</option>
            </select>

            <label for="transF"> Mitä trans muidet on? </label>
            <select name="transF" id="transF">
                <option value="1"> muidei </option>
                <option value="-1"> äijjii </option>
                <option value="-0.5"> pervoja lasten kutittelioita </option>
            </select>

            <label for="ronication"> Missä Roni asuu? </label>
            <input type="text" name="ronication">
            
            <label for="hobot"> Kummat on likasempia homot vai lesbot? </label>
            <select name="hobot" id="hobot">
                <option value="0.5"> homot </option>
                <option value="-0.5"> lesbot </option>
                <option value="1"> kummatkin ovat likaisia rawr </option>
            </select>

            <label for="transM"> Koskeeko trans äijjät muijjia? </label>
            <select name="transM" id="transM">
                <option value="1"> kyllä koska ne on likasia miehiä </option>
                <option value="-1"> ei koska nainen ei voi olla likanen koskettelia </option>
            </select>

            <label for="musti"> Onko \"mustikat\" ällöjä?  </label>
            <select name="musti" id="musti">
                <option value="1"> kyllä </option>
                <option value="-1"> ei </option>
                <option value="0"> riippuu mistä metsästä löytyy </option>
            </select>

            <label for="tekoaly"> Onko grok jumala? </label>
            <select name="kysm_4" id="kysm_4">
                <option value="0"> ei </option>
                <option value="-1"> kyllä </option>
            </select>

            <label for="seksismi"> Onko rasismi okei? </label>
            <select name="seksismi" id="seksismi">
                <option value="1"> vain likaisa miehiä kohtaan </option>
                <option value="-1"> vain naisia kohtaan </option>
                <option value="0.5"> ei </option>
            </select>

            <label for="kutittelu"> Onko Uula tosi kewl? </label>
            <select name="kutittelu" id="kutittelu">
                <option value="1"> kyllä </option>
                <option value="-2"> ei </option>
            </select>

            <label for="last_and_least"> Oliko kysymykset tässä intulektuaalisia? </label>
            <select name="last_and_least" id="last_and_least">
                <option value="1"> kyllä </option>
                <option value="0"> ei </option>
                <option value="0.5"> ei koska oon lesbo </option>
            </select>

            <label for="submissiivinen_nappi"> submit </label>
            <input type="submit" name="submissiivinen_nappi">
        </form>
        <script>
            function iqQuiz() {
                
            }
        </script>
    </body>
</html>
